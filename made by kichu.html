<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifePulse | Kichuz Code</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --primary: #6366f1;
            --secondary: #ec4899;
            --accent: #22d3ee;
            --card: rgba(30, 41, 59, 0.8);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: white;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .wrapper {
            width: 90%;
            max-width: 900px;
            position: relative;
            z-index: 10;
        }

        /* --- FRONT PAGE DESIGN --- */
        #setupView {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hero-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        /* SVG Human Stylized */
        .human-svg {
            width: 260px;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.4));
            margin-bottom: -40px; 
            z-index: 1;
        }

        .input-section {
            background: var(--card);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            z-index: 2;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        input[type="date"] {
            background: rgba(0,0,0,0.4);
            border: 2px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 12px;
            color: white;
            width: 100%;
            margin-bottom: 20px;
            font-size: 1.1rem;
            outline: none;
        }

        input[type="date"]:focus { border-color: var(--primary); }

        button {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            padding: 16px 35px;
            border-radius: 15px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4); }

        /* --- SLIDING FACTS DESIGN --- */
        #results {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
        }

        .fact-container {
            position: relative;
            width: 100%;
            height: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .fact-card {
            position: absolute;
            background: var(--card);
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            transform: translateX(100vw);
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .fact-card.active {
            transform: translateX(0);
            opacity: 1;
        }

        .fact-card.exit {
            transform: translateX(-100vw);
            opacity: 0;
        }

        .fact-card .icon { font-size: 3.5rem; margin-bottom: 15px; display: block; }
        .fact-card .label { color: var(--accent); letter-spacing: 2px; text-transform: uppercase; font-size: 0.85rem; font-weight: 700; }
        .fact-card .value { font-size: 2.8rem; font-weight: 800; display: block; margin-top: 10px; color: #fff; }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            width: auto;
        }

        /* --- MARQUEE BY KICHUZ CODE --- */
        .marquee-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 45px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            overflow: hidden;
            border-top: 1px solid var(--primary);
            z-index: 1000;
        }

        .marquee-content {
            white-space: nowrap;
            will-change: transform;
            animation: marquee-run 15s linear infinite;
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.6);
            letter-spacing: 3px;
        }

        @keyframes marquee-run {
            from { transform: translateX(100%); }
            to { transform: translateX(-100%); }
        }

        /* Utility Transitions */
        .hidden { display: none !important; }
        .slide-out-top { transform: translateY(-100vh); opacity: 0; }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="setupView">
        <h1>LifePulse</h1>
        <p style="color: #94a3b8; margin-bottom: 5px;">Discover the data behind your existence.</p>
        
        <div class="hero-container">
            <svg class="human-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <circle cx="100" cy="45" r="22" fill="#6366f1" opacity="0.9" /> <path fill="white" d="M75,75 L125,75 Q150,75 150,110 L150,200 L125,200 L125,140 L110,140 L110,200 L90,200 L90,140 L75,140 L75,200 L50,200 L50,110 Q50,75 75,75 Z" /> <path d="M70,95 Q35,105 35,145 M130,95 Q165,105 165,145" stroke="#fff" stroke-width="8" stroke-linecap="round" fill="none"/>
            </svg>

            <div class="input-section">
                <label style="display:block; margin-bottom:12px; font-weight:600; color: #cbd5e1;">ENTER YOUR BIRTH DATE</label>
                <input type="date" id="dobInput">
                <button onclick="startJourney()">START THE JOURNEY</button>
            </div>
        </div>
    </div>

    <div id="results">
        <div class="fact-container" id="factContainer">
            <div class="fact-card active" id="currentFact">
                <span class="icon" id="fIcon">✨</span>
                <span class="label" id="fLabel">Initialization</span>
                <span class="value" id="fValue">Ready to begin</span>
            </div>
        </div>

        <div class="controls">
            <button onclick="window.location.reload()" class="btn-outline">RESET</button>
            <button onclick="nextFact()" id="nextBtn" style="width: 200px;">NEXT PULSE →</button>
        </div>
        <p id="progressText" style="margin-top:20px; color:#64748b; font-size: 0.8rem; font-weight: 700;"></p>
    </div>
</div>

<div class="marquee-container">
    <div class="marquee-content">
        DEVELOPED BY KICHUZ CODE &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; INNOVATION IN MOTION &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; LIFEPULSE V1.0 &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; CODED WITH PASSION &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; KICHUZ CODE &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; THE JOURNEY CONTINUES
    </div>
</div>

<script>
    let facts = [];
    let currentIdx = -1;

    function startJourney() {
        const dobVal = document.getElementById('dobInput').value;
        if (!dobVal) return alert("Please select your date of birth!");

        const dob = new Date(dobVal);
        const now = new Date();
        const diff = now - dob;
        if (diff < 0) return alert("You can't be from the future! Try again.");

        // Calculate Stats
        const sec = Math.floor(diff / 1000);
        const days = Math.floor(sec / 86400);
        const age = (days / 365.25).toFixed(2);
        const hearts = (Math.floor((sec / 60) * 72)).toLocaleString();
        const blinks = (Math.floor((sec / 60) * 15)).toLocaleString();
        const sleep = (days / 365.25 / 3).toFixed(1);

        // Define Fact Steps
        facts = [
            { icon: "🎂", label: "Exact Age", value: age + " Years" },
            { icon: "📅", label: "Total Days", value: days.toLocaleString() + " Days" },
            { icon: "❤️", label: "Heartbeats", value: hearts },
            { icon: "👁️", label: "Blinks", value: blinks },
            { icon: "😴", label: "Time Slept", value: sleep + " Years" },
            { icon: "🚀", label: "Distance in Space", value: (days * 2.6).toLocaleString() + "M km" },
            { icon: "✨", label: "Status", value: "Legendary" }
        ];

        // Slide Out Home View
        document.getElementById('setupView').classList.add('slide-out-top');
        
        setTimeout(() => {
            document.getElementById('setupView').classList.add('hidden');
            document.getElementById('results').style.display = 'flex';
            nextFact(); // Show the first fact automatically
        }, 600);
    }

    function nextFact() {
        if (currentIdx >= facts.length - 1) {
            document.getElementById('nextBtn').innerText = "RESTART";
            document.getElementById('nextBtn').onclick = () => window.location.reload();
            return;
        }

        const card = document.getElementById('currentFact');
        
        // Slide Out Current Card (except on first load)
        if (currentIdx !== -1) {
            card.classList.remove('active');
            card.classList.add('exit');
        }

        setTimeout(() => {
            currentIdx++;
            
            // Update Card Content
            document.getElementById('fIcon').innerText = facts[currentIdx].icon;
            document.getElementById('fLabel').innerText = facts[currentIdx].label;
            document.getElementById('fValue').innerText = facts[currentIdx].value;
            document.getElementById('progressText').innerText = `FACT ${currentIdx + 1} OF ${facts.length}`;

            // Reset Card Position and Slide In
            card.classList.remove('exit');
            void card.offsetWidth; // Force Reflow
            card.classList.add('active');
            
            if(currentIdx === facts.length - 1) {
                document.getElementById('nextBtn').innerText = "FINISH";
            }
        }, currentIdx === -1 ? 0 : 400);
    }
</script>

</body>
</html>
